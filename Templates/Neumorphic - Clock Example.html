<!-- html page with a centered neumorphic clock, off white page background and round purple clock controls below it with white icons -->

<!DOCTYPE html>
<html>
<head>
	<title>Neumorphic Clock</title>
	<style>
		body {
			background-color: #F7F7F7; /* off-white page background */
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
		}
		.clock {
			width: 300px;
			height: 300px;
			border-radius: 50%;
			background-color: #F7F7F7; /* off-white clock background */
			box-shadow: 10px 10px 30px #D8D8D8, -10px -10px 30px #FFFFFF; /* neumorphic effect */
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
		}
		.clock h1 {
			font-size: 3em;
			color: #333;
			margin: 0;
			padding: 0;
		}
		.controls {
			margin-top: 50px;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.control {
			background-color: #6B52AE; /* purple control background */
			border-radius: 50%;
			width: 50px;
			height: 50px;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0 10px;
		}
		.control i {
			font-size: 1.5em;
			color: #FFF; /* white icon color */
		}
	</style>
</head>
<body>

	<div class="clock">
		<h1>12:00</h1>
	</div>
	<div class="controls">
		<div class="control">
			<i class="fa fa-arrow-up"></i>
		</div>
		<div class="control">
			<i class="fa fa-play"></i>
		</div>
		<div class="control">
			<i class="fa fa-arrow-down"></i>
		</div>
	</div>
    

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</body>

</html>
